<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCOHIT | Sovereign Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #ffffff; color: #000; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Full Screen Content Area */
        .main-content { height: 94vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        
        /* Ultra-Thin Fixed Bottom Footer */
        .ultra-thin-footer { 
            height: 6vh; /* एकदम कम ऊँचाई */
            background: #fff; 
            border-top: 1px solid #f0f0f0; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            z-index: 1000;
        }

        .icon-btn { cursor: pointer; color: #bbb; transition: 0.2s; text-align: center; flex: 1; }
        .icon-btn i { font-size: 18px; }
        .icon-btn:hover, .active-tab { color: #000; }

        /* Compact Plus Button */
        .plus-circle { 
            width: 35px; height: 35px; background: #000; color: #fff; 
            border-radius: 10px; display: flex; align-items: center; 
            justify-content: center; font-size: 16px; transition: 0.2s;
        }

        /* Video/Reel Grid (Pure White) */
        .content-grid { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr; gap: 2px; }
        .reel-box { width: 100%; aspect-ratio: 9/16; background: #fafafa; border: 1px solid #f0f0f0; position: relative; }

        /* Actions Overlay */
        #studio-panel { 
            display: none; position: fixed; inset: 0; background: #fff; 
            z-index: 2000; flex-direction: column; padding: 20px; 
        }
        .grid-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 50px; }
        .menu-box { background: #f9f9f9; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #eee; cursor: pointer; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <main class="main-content">
        <div class="content-grid">
            <div class="reel-box flex items-center justify-center text-zinc-300 italic text-xs">Video / Reel Display</div>
            <div class="reel-box flex items-center justify-center text-zinc-300 italic text-xs">Video / Reel Display</div>
        </div>
    </main>

    <div id="studio-panel">
        <div class="flex justify-between items-center border-b pb-4">
            <h2 class="font-black italic text-lg tracking-tighter">ICCOHIT STUDIO</h2>
            <button onclick="toggleStudio()" class="text-3xl">&times;</button>
        </div>
        <div class="grid-menu">
            <div class="menu-box" onclick="act('UPLOAD')"><i class="fas fa-upload mb-2"></i><br>UPLOAD</div>
            <div class="menu-box" onclick="act('REEL')"><i class="fas fa-film mb-2"></i><br>REEL</div>
            <div class="menu-box" onclick="act('POST')"><i class="fas fa-edit mb-2"></i><br>POST</div>
            <div class="menu-box" onclick="act('FRONT')"><i class="fas fa-camera mb-2"></i><br>FRONT</div>
            <div class="menu-box" onclick="act('BACK')"><i class="fas fa-sync mb-2"></i><br>BACK</div>
            <div class="menu-box" onclick="act('LIVE')"><i class="fas fa-rss mb-2"></i><br>LIVE</div>
            <div class="menu-box" onclick="act('GALLERY')"><i class="fas fa-images mb-2"></i><br>GALLERY</div>
            <div class="menu-box" onclick="act('EDIT')"><i class="fas fa-magic mb-2"></i><br>EDIT</div>
            <div class="menu-box" onclick="act('SHARE')"><i class="fas fa-share mb-2"></i><br>SHARE</div>
        </div>
    </div>

    <footer class="ultra-thin-footer">
        <div class="icon-btn active-tab" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="icon-btn" onclick="act('AI BOOT')"><i class="fas fa-robot text-blue-500"></i></div>
        
        <div class="icon-btn flex justify-center" onclick="toggleStudio()">
            <div class="plus-circle"><i class="fas fa-plus"></i></div>
        </div>
        
        <div class="icon-btn" onclick="act('PROFILE')"><i class="fas fa-user"></i></div>
        <div class="icon-btn" onclick="act('MENU')"><i class="fas fa-bars"></i></div>
    </footer>

    <script>
        function toggleStudio() {
            const panel = document.getElementById('studio-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }
        function act(m) {
            console.log("Activating: " + m);
            alert("System: " + m + " Mode Active");
        }
    </script>
</body>
</html>
