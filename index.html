<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCOHIT | Sovereign Elite Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #ffffff; color: #000; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .main-content { height: 94vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding-bottom: 7vh; }
        .ultra-thin-footer { height: 6vh; background: #fff; border-top: 1px solid #f0f0f0; position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; justify-content: space-around; z-index: 1000; }
        .icon-btn { cursor: pointer; color: #bbb; transition: 0.2s; text-align: center; flex: 1; }
        .icon-btn:hover, .active-tab { color: #000; }
        .plus-circle { width: 38px; height: 38px; background: #000; color: #fff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        
        .reel-box { width: 100%; max-width: 500px; aspect-ratio: 9/16; background: #000; position: relative; border-bottom: 2px solid #fff; }
        .ad-overlay { position: absolute; top: 10px; right: 10px; background: rgba(255,255,0,0.9); color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; z-index: 50; }
        
        .full-panel { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; flex-direction: column; padding: 20px; overflow-y: auto; }
        .camera-view { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 20px; position: relative; overflow: hidden; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        
        .menu-box { background: #f9f9f9; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #eee; cursor: pointer; font-size: 11px; font-weight: 800; transition: 0.3s; }
    </style>
</head>
<body>

    <main class="main-content" id="home-feed">
        <div class="reel-box">
            <div id="dynamic-ad" class="ad-overlay italic">ICCOHIT AD</div>
            <div class="absolute bottom-10 left-5 text-white z-10">
                <p class="font-bold">@Sovereign_Scientist</p>
                <p class="text-sm">Viral Content Engine Live...</p>
            </div>
        </div>
    </main>

    <div id="studio-panel" class="full-panel">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-black italic text-xl tracking-tighter">ICCOHIT STUDIO</h2>
            <button onclick="closeAllPanels()" class="text-3xl">&times;</button>
        </div>

        <div id="camera-section" class="hidden">
            <div class="camera-view">
                <video id="video-feed" autoplay playsinline></video>
                <div id="overlay-text" class="absolute inset-0 flex items-center justify-center pointer-events-none text-center"></div>
            </div>
            <div class="flex justify-around mt-4">
                <button onclick="switchCamera()" class="p-4 bg-zinc-100 rounded-full"><i class="fas fa-sync"></i></button>
                <button id="record-btn" onclick="toggleRecording()" class="p-6 bg-red-600 rounded-full border-4 border-white"></button>
                <button onclick="openEditor()" class="p-4 bg-zinc-100 rounded-full"><i class="fas fa-magic"></i></button>
            </div>
        </div>

        <div id="studio-menu" class="grid grid-cols-3 gap-3 mt-4">
            <div class="menu-box" onclick="startCamera('user')"><i class="fas fa-camera text-blue-500 mb-2"></i><br>FRONT</div>
            <div class="menu-box" onclick="startCamera('environment')"><i class="fas fa-video text-green-500 mb-2"></i><br>BACK</div>
            <div class="menu-box" onclick="act('GALLERY')"><i class="fas fa-images text-purple-500 mb-2"></i><br>GALLERY</div>
            <div class="menu-box" onclick="act('MUSIC')"><i class="fas fa-music text-pink-500 mb-2"></i><br>MUSIC</div>
            <div class="menu-box" onclick="act('ADS')"><i class="fas fa-ad text-yellow-600 mb-2"></i><br>ADS</div>
            <div class="menu-box" onclick="act('LIVE')"><i class="fas fa-rss text-red-500 mb-2"></i><br>LIVE</div>
        </div>

        <div id="editor-tools" class="hidden mt-6 p-4 border rounded-2xl bg-zinc-50">
            <input type="text" id="content-input" oninput="updateOverlayText()" placeholder="Add Viral Text..." class="w-full p-3 rounded-lg border mb-3 outline-none">
            <div class="flex items-center justify-between mb-4">
                <input type="color" id="text-color" onchange="updateOverlayText()" value="#ffffff">
                <select id="text-size" onchange="updateOverlayText()" class="p-2 border rounded">
                    <option value="20px">Small</option>
                    <option value="40px" selected>Medium</option>
                    <option value="60px">Large</option>
                </select>
            </div>
            <button onclick="publishToCloud()" class="w-full bg-black text-white py-4 rounded-xl font-black italic uppercase">Publish Globally</button>
        </div>
    </div>

    <div id="profile-panel" class="full-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black italic text-xl tracking-tighter">SOVEREIGN DASHBOARD</h2>
            <button onclick="closeAllPanels()" class="text-3xl">&times;</button>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-zinc-100 p-5 rounded-2xl">
                <p class="text-[10px] font-bold text-zinc-500 uppercase">Total Earning</p>
                <p class="text-2xl font-black text-green-600">₹ <span id="balance">1250.00</span></p>
            </div>
            <div class="bg-zinc-100 p-5 rounded-2xl text-center">
                <p class="text-[10px] font-bold text-zinc-500 uppercase">Viral Status</p>
                <p class="text-lg font-black uppercase text-blue-600">Active</p>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="font-bold border-b pb-2 text-sm">Payment & Withdraw</h3>
            <button onclick="pay('500', 'Elite_Plan')" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold flex justify-between">
                <span>Upgrade to Elite</span>
                <span>₹500</span>
            </button>
            <div class="p-4 border rounded-2xl bg-zinc-50">
                <input type="text" id="upi-request" placeholder="Enter UPI ID for Withdrawal" class="w-full p-2 border rounded mb-2 text-sm outline-none">
                <button onclick="syncWithdrawal()" class="w-full bg-black text-white py-2 rounded-lg text-sm font-bold">Request Payout</button>
            </div>
        </div>
    </div>

    <footer class="ultra-thin-footer">
        <div class="icon-btn active-tab" onclick="closeAllPanels()"><i class="fas fa-home"></i></div>
        <div class="icon-btn" onclick="act('AI')"><i class="fas fa-robot text-blue-500"></i></div>
        <div class="icon-btn flex justify-center" onclick="openStudio()"><div class="plus-circle"><i class="fas fa-plus"></i></div></div>
        <div class="icon-btn" onclick="openProfile()"><i class="fas fa-chart-line"></i></div>
        <div class="icon-btn" onclick="act('MENU')"><i class="fas fa-bars"></i></div>
    </footer>

    <script>
        let currentStream;
        let mediaRecorder;
        let recordedChunks = [];
        let facingMode = 'user';

        // --- 1. SETTINGS SYNC (Ads from Admin Panel) ---
        async function syncSettings() {
            try {
                const res = await fetch('/api/ads/manage');
                const data = await res.json();
                if(data.active) document.getElementById('dynamic-ad').innerText = data.content;
            } catch(e) { console.log("Ad Sync Offline"); }
        }
        window.onload = syncSettings;

        // --- 2. CAMERA ENGINE ---
        async function startCamera(facing) {
            facingMode = facing;
            document.getElementById('studio-menu').classList.add('hidden');
            document.getElementById('camera-section').classList.remove('hidden');
            try {
                if (currentStream) currentStream.getTracks().forEach(t => t.stop());
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: true });
                document.getElementById('video-feed').srcObject = currentStream;
                mediaRecorder = new MediaRecorder(currentStream);
                mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
            } catch (e) { alert("Camera Error"); }
        }

        function toggleRecording() {
            const btn = document.getElementById('record-btn');
            if(mediaRecorder.state === "inactive") {
                recordedChunks = [];
                mediaRecorder.start();
                btn.style.background = "#22c55e"; 
            } else {
                mediaRecorder.stop();
                btn.style.background = "#dc2626";
                alert("Video Saved to Engine!");
            }
        }

        function switchCamera() {
            facingMode = (facingMode === 'user') ? 'environment' : 'user';
            startCamera(facingMode);
        }

        // --- 3. PUBLISH & SYNC (Sends to MongoDB for Admin to see) ---
        async function publishToCloud() {
            const text = document.getElementById('content-input').value;
            try {
                await fetch('/api/withdraw', { // Generic API for syncing
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: "HG_SCIENTIST", content: text, type: "POST_VIRAL" })
                });
                alert("Published! Your content is now syncing with Global Nodes.");
                closeAllPanels();
            } catch(e) { alert("Network Sync Failed"); }
        }

        // --- 4. WITHDRAWAL SYNC (Sends request to separate Admin URL) ---
        async function syncWithdrawal() {
            const upi = document.getElementById('upi-request').value;
            if(!upi) return alert("UPI ID दर्ज करें");
            try {
                await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: "HG_USER", amount: "1250", upiId: upi, status: "pending" })
                });
                alert("Request Sent! Admin Panel पर स्टेटस चेक करें।");
            } catch(e) { alert("Sync Error"); }
        }

        // --- 5. GLOBAL PAYMENT (UPI) ---
        function pay(amt, type) {
            const upiID = "harigovindsingh91-2@oksbi";
            const upiUrl = `upi://pay?pa=${upiID}&pn=ICCOHIT&am=${amt}&tn=${type}&cu=INR`;
            window.location.href = upiUrl;
        }

        // --- UI HELPERS ---
        function updateOverlayText() {
            const overlay = document.getElementById('overlay-text');
            overlay.innerText = document.getElementById('content-input').value;
            overlay.style.color = document.getElementById('text-color').value;
            overlay.style.fontSize = document.getElementById('text-size').value;
            overlay.style.fontWeight = "900";
        }
        function openStudio() { closeAllPanels(); document.getElementById('studio-panel').style.display = 'flex'; }
        function openProfile() { closeAllPanels(); document.getElementById('profile-panel').style.display = 'flex'; }
        function closeAllPanels() {
            document.querySelectorAll('.full-panel').forEach(p => p.style.display = 'none');
            document.getElementById('studio-menu').classList.remove('hidden');
            document.getElementById('camera-section').classList.add('hidden');
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        }
        function openEditor() { document.getElementById('editor-tools').classList.toggle('hidden'); }
        function act(m) { alert("System: " + m + " Mode Active"); }
    </script>
</body>
</html>
