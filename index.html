<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .view { display: none; height: 92vh; padding: 20px; overflow-y: auto; }
        .active { display: block; }
        .icco-card { background: #0a0a0a; border: 1px solid #111; border-radius: 30px; padding: 20px; }
    </style>
</head>
<body>

    <div id="home" class="view active">
        <div class="flex gap-2 mb-6">
            <input id="q" type="text" placeholder="ICCOHIT Search..." class="flex-1 bg-zinc-900 p-4 rounded-2xl border border-white/5 outline-none text-xs">
            <button onclick="alert('Searching Cluster0...')" class="bg-cyan-500 text-black px-6 rounded-2xl font-bold text-xs">GO</button>
        </div>
        <div class="icco-card mb-4">
            <div class="w-full aspect-video bg-zinc-900 rounded-2xl mb-4 flex items-center justify-center italic text-zinc-700">Video Content</div>
            <p class="font-bold text-sm">@harigovind_official</p>
            <p class="text-[10px] text-zinc-500">Global Research & Development Division</p>
        </div>
    </div>

    <div id="studio" class="view">
        <video id="v" autoplay playsinline class="w-full aspect-[9/16] bg-zinc-900 rounded-[3rem] mb-6 border-2 border-zinc-800"></video>
        <button onclick="navigator.mediaDevices.getUserMedia({video:true}).then(s=>v.srcObject=s)" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Open Master Lens 🎥</button>
    </div>

    <div id="wallet" class="view">
        <div class="icco-card border-l-4 border-cyan-500 mb-6">
            <p class="text-[10px] text-zinc-500 font-bold">TOTAL REVENUE</p>
            <h2 class="text-4xl font-black mt-1">₹1,24,500</h2>
            <button onclick="window.location.href='upi://pay?pa=harigovindsingh91-2@oksbi&pn=ICCOHIT&am=0'" class="mt-6 w-full bg-cyan-500 text-black py-3 rounded-xl font-bold text-xs uppercase">Withdraw</button>
        </div>

        <footer class="mt-20 border-t border-zinc-900 pt-10 text-center opacity-30">
            <p class="text-[10px] font-bold">Aciwho Welfare Foundation | Lucknow, 226001</p>
            <p class="text-[9px] mt-2 italic">Admin UPI: harigovindsingh91-2@oksbi | 2026 ICCOHIT</p>
        </footer>
    </div>

    <nav class="h-[8vh] bg-black border-t border-white/5 flex justify-around items-center">
        <button onclick="nav('home')" class="text-xl">🏠</button>
        <button onclick="nav('studio')" class="text-xl">🎥</button>
        <button onclick="nav('wallet')" class="text-xl">💰</button>
    </nav>

    <script>
        function nav(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
